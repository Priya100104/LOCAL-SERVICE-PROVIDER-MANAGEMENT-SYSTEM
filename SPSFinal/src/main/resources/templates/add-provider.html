<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Provider – Service Provider System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
        .card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px;width:100%;max-width:520px;}
        h2{color:#f1f5f9;font-family:'Space Grotesk',sans-serif;font-size:22px;text-align:center;margin-bottom:6px;}
        .sub{color:#64748b;font-size:14px;text-align:center;margin-bottom:28px;}
        .row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
        label{display:block;color:#94a3b8;font-size:13px;font-weight:500;margin-bottom:6px;margin-top:18px;}
        input,select{width:100%;padding:11px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;font-size:15px;outline:none;transition:.2s;}
        input:focus,select:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15);}
        select option{background:#1e293b;}
        .btn{width:100%;padding:13px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:28px;transition:.2s;}
        .btn:hover{background:#1d4ed8;}
        .error{background:#7f1d1d;border:1px solid #dc2626;color:#fca5a5;padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:20px;}
        .back{text-align:center;margin-top:16px;}
        .back a{color:#64748b;font-size:14px;text-decoration:none;}
    </style>
</head>
<body>
<div class="card">
    <h2>➕ Add New Provider</h2>
    <p class="sub">Fill in the details to register a service provider</p>

    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <form action="/web/providers/add" method="post" th:object="${provider}">
        <label>Business Name</label>
        <input type="text" th:field="*{businessName}" placeholder="e.g. Raj Plumbing Services" required>
        <label>Service Type</label>
        <select th:field="*{serviceType}" required>
            <option value="">Select a service type…</option>
            <option th:each="t : ${serviceTypes}" th:value="${t}" th:text="${t}"></option>
        </select>
        <div class="row">
            <div>
                <label>Username</label>
                <input type="text" th:field="*{username}" placeholder="unique_username" required>
            </div>
            <div>
                <label>Email</label>
                <input type="email" th:field="*{email}" placeholder="provider@email.com" required>
            </div>
        </div>
        <div class="row">
            <div>
                <label>Phone</label>
                <input type="text" th:field="*{phone}" placeholder="10-digit number">
            </div>
            <div>
                <label>Hourly Rate (₹)</label>
                <input type="number" th:field="*{hourlyRate}" placeholder="350" min="0" step="0.01">
            </div>
        </div>
        <label>Years of Experience</label>
        <input type="number" th:field="*{yearsOfExperience}" placeholder="5" min="0">
        <button type="submit" class="btn">Add Provider</button>
    </form>
    <div class="back"><a href="/web/providers">← Back to Providers</a></div>
</div>
</body>
</html>
