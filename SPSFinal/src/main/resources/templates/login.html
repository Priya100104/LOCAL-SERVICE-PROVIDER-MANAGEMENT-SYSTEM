<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login – Service Provider System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;}
        .card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px;width:100%;max-width:440px;box-shadow:0 25px 60px rgba(0,0,0,.4);}
        .logo{text-align:center;margin-bottom:28px;}
        .logo span{font-size:36px;}
        .logo h2{color:#f1f5f9;font-family:'Space Grotesk',sans-serif;font-size:22px;margin-top:8px;}
        .logo p{color:#94a3b8;font-size:14px;margin-top:4px;}
        .tab-row{display:flex;background:#0f172a;border-radius:10px;padding:4px;margin-bottom:28px;gap:4px;}
        .tab{flex:1;text-align:center;padding:10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:#64748b;border:none;background:transparent;transition:.2s;}
        .tab.active{background:#2563eb;color:#fff;}
        label{display:block;color:#94a3b8;font-size:13px;font-weight:500;margin-bottom:6px;margin-top:18px;}
        input{width:100%;padding:11px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;font-size:15px;outline:none;transition:.2s;}
        input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15);}
        .btn{width:100%;padding:13px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:24px;transition:.2s;}
        .btn:hover{background:#1d4ed8;}
        .error{background:#7f1d1d;border:1px solid #dc2626;color:#fca5a5;padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:20px;}
        .footer{text-align:center;margin-top:24px;color:#64748b;font-size:14px;}
        .footer a{color:#60a5fa;text-decoration:none;}
        .hint{background:#1e3a5f;border:1px solid #2563eb;border-radius:8px;padding:12px 14px;font-size:13px;color:#93c5fd;margin-top:20px;}
        .hint strong{display:block;margin-bottom:4px;color:#bfdbfe;}
        .hint code{background:#0f172a;padding:2px 6px;border-radius:4px;}
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <span>🔧</span>
        <h2>Service Provider System</h2>
        <p>Sign in to your account</p>
    </div>

    <!-- 3 role tabs: Customer | Provider | Admin -->
    <div class="tab-row">
        <button class="tab" id="tab-customer" onclick="switchRole('customer')">👤 Customer</button>
        <button class="tab" id="tab-provider" onclick="switchRole('provider')">🔧 Provider</button>
        <button class="tab" id="tab-admin"    onclick="switchRole('admin')">🛡️ Admin</button>
    </div>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form action="/web/login" method="post">
        <input type="hidden" name="role" id="roleInput" value="customer"/>
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required autofocus/>
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required/>
        <button type="submit" class="btn" id="loginBtn">Sign In as Customer</button>
    </form>

    <!-- Hints per role -->
    <div class="hint" id="hint-customer">
        <strong>Demo Customer Login</strong>
        username: <code>customer1</code> &nbsp;|&nbsp; password: <code>password123</code>
    </div>
    <div class="hint" id="hint-provider" style="display:none">
        <strong>Demo Provider Login</strong>
        username: <code>plumber_raj</code> &nbsp;|&nbsp; password: <code>pass123</code>
    </div>
    <div class="hint" id="hint-admin" style="display:none">
        <strong>Admin Login</strong>
        username: <code>admin</code> &nbsp;|&nbsp; password: <code>admin123</code>
    </div>

    <div class="footer">
        Don't have an account? <a href="/web/register">Register here</a>
    </div>
</div>

<script>
    const labels = {customer:'Customer', provider:'Provider', admin:'Admin'};
    // read server-side selected role
    const presel = /*[[${selectedRole}]]*/ 'customer';
    function switchRole(role){
        document.getElementById('roleInput').value = role;
        ['customer','provider','admin'].forEach(r => {
            document.getElementById('tab-'+r).classList.toggle('active', r===role);
            const h = document.getElementById('hint-'+r);
            if(h) h.style.display = r===role ? '' : 'none';
        });
        document.getElementById('loginBtn').textContent = 'Sign In as ' + labels[role];
    }
    switchRole(presel || 'customer');
</script>
</body>
</html>
