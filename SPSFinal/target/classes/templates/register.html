<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register – Service Provider System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;}
        .card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px;width:100%;max-width:520px;box-shadow:0 25px 60px rgba(0,0,0,.4);}
        .logo{text-align:center;margin-bottom:24px;}
        .logo span{font-size:32px;}
        .logo h2{color:#f1f5f9;font-family:'Space Grotesk',sans-serif;font-size:22px;margin-top:8px;}
        .logo p{color:#94a3b8;font-size:14px;margin-top:4px;}
        .tab-row{display:flex;background:#0f172a;border-radius:10px;padding:4px;margin-bottom:24px;gap:4px;}
        .tab{flex:1;text-align:center;padding:10px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:#64748b;border:none;background:transparent;transition:.2s;}
        .tab.active{background:#2563eb;color:#fff;}
        .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
        label{display:block;color:#94a3b8;font-size:13px;font-weight:500;margin-bottom:6px;margin-top:16px;}
        input,select{width:100%;padding:11px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;font-size:14px;outline:none;transition:.2s;}
        input:focus,select:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15);}
        select option{background:#1e293b;}
        .btn{width:100%;padding:13px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:22px;transition:.2s;}
        .btn:hover{background:#1d4ed8;}
        .error{background:#7f1d1d;border:1px solid #dc2626;color:#fca5a5;padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;}
        .footer{text-align:center;margin-top:18px;color:#64748b;font-size:14px;}
        .footer a{color:#60a5fa;text-decoration:none;}
        .notice{background:#1c3a2a;border:1px solid #059669;color:#6ee7b7;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:14px;}
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <span id="regIcon">👤</span>
        <h2>Create Account</h2>
        <p id="regSubtitle">Register to book services</p>
    </div>

    <!-- 2 tabs: Customer | Provider -->
    <div class="tab-row">
        <button class="tab active" id="tab-customer" onclick="switchTab('customer')">👤 Register as Customer</button>
        <button class="tab"        id="tab-provider" onclick="switchTab('provider')">🔧 Register as Provider</button>
    </div>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <!-- ── CUSTOMER FORM ── -->
    <div id="form-customer">
        <form action="/web/register/customer" method="post">
            <div class="row">
                <div><label>First Name *</label><input type="text" name="firstName" placeholder="John" required/></div>
                <div><label>Last Name *</label><input type="text" name="lastName" placeholder="Doe" required/></div>
            </div>
            <label>Username *</label>
            <input type="text" name="username" placeholder="Choose a username" required/>
            <label>Email *</label>
            <input type="email" name="email" placeholder="you@email.com" required/>
            <label>Password *</label>
            <input type="password" name="password" placeholder="Create a password" required/>
            <label>Phone</label>
            <input type="text" name="phone" placeholder="10-digit mobile number"/>
            <label>Address</label>
            <input type="text" name="address" placeholder="Your address"/>
            <button type="submit" class="btn">Create Customer Account</button>
        </form>
    </div>

    <!-- ── PROVIDER FORM ── -->
    <div id="form-provider" style="display:none">
        <div class="notice">⏳ Your account will be pending admin verification before customers can book you.</div>
        <form action="/web/register/provider" method="post">
            <div class="row">
                <div>
                    <label>Business Name *</label>
                    <input type="text" name="businessName" placeholder="e.g. Raj Plumbing" required/>
                </div>
                <div>
                    <label>Service Type *</label>
                    <select name="serviceType" required>
                        <option value="">-- Select --</option>
                        <option value="Plumbing">🔩 Plumbing</option>
                        <option value="Electrical">⚡ Electrical</option>
                        <option value="Cleaning">🧹 Cleaning</option>
                        <option value="Carpentry">🪚 Carpentry</option>
                        <option value="Painting">🎨 Painting</option>
                    </select>
                </div>
            </div>
            <label>Username *</label>
            <input type="text" name="username" placeholder="Choose a unique username" required/>
            <label>Password *</label>
            <input type="password" name="password" placeholder="Create a password" required/>
            <label>Email *</label>
            <input type="email" name="email" placeholder="business@email.com" required/>
            <label>Phone</label>
            <input type="text" name="phone" placeholder="Business contact number"/>
            <div class="row">
                <div>
                    <label>Years of Experience *</label>
                    <input type="number" name="yearsOfExperience" min="0" max="50" placeholder="e.g. 5" required/>
                </div>
                <div>
                    <label>Hourly Rate (₹) *</label>
                    <input type="number" name="hourlyRate" min="0" step="50" placeholder="e.g. 400" required/>
                </div>
            </div>
            <button type="submit" class="btn">Register as Provider</button>
        </form>
    </div>

    <div class="footer">Already have an account? <a href="/web/login">Sign in here</a></div>
</div>

<script>
    const icons    = {customer:'👤', provider:'🔧'};
    const subtitles= {customer:'Register to book services', provider:'Join as a service professional'};
    // restore tab if server returned error
    const active   = /*[[${activeTab}]]*/ 'customer';
    function switchTab(tab){
        ['customer','provider'].forEach(t => {
            document.getElementById('tab-'+t).classList.toggle('active', t===tab);
            document.getElementById('form-'+t).style.display = t===tab ? '' : 'none';
        });
        document.getElementById('regIcon').textContent     = icons[tab];
        document.getElementById('regSubtitle').textContent = subtitles[tab];
    }
    switchTab(active || 'customer');
</script>
</body>
</html>
