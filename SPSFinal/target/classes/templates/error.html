<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - Service Provider System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #f5f7fa; display: flex; flex-direction: column; min-height: 100vh; }
        .navbar { background: #1565c0; color: white; padding: 16px 32px; display: flex; align-items: center; gap: 24px; }
        .navbar a { color: white; text-decoration: none; font-size: 15px; padding: 6px 12px; border-radius: 4px; }
        .navbar h1 { font-size: 18px; font-weight: 600; flex: 1; }
        .error-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .error-card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 48px; text-align: center; max-width: 500px; }
        .error-icon { font-size: 64px; margin-bottom: 16px; }
        .error-code  { font-size: 72px; font-weight: 700; color: #ef5350; line-height: 1; margin-bottom: 8px; }
        .error-title { font-size: 22px; font-weight: 600; color: #333; margin-bottom: 12px; }
        .error-msg   { font-size: 15px; color: #666; margin-bottom: 28px; line-height: 1.6; }
        .btn { display: inline-block; padding: 12px 28px; background: #1565c0; color: white; text-decoration: none; border-radius: 8px; font-size: 15px; font-weight: 500; }
        .btn:hover { background: #0d47a1; }
        .btn-gray { background: #eceff1; color: #333; margin-left: 12px; }
    </style>
</head>
<body>

<nav class="navbar">
    <h1>🔧 Service Provider System</h1>
    <a href="/web/">Home</a>
    <a href="/web/providers">Providers</a>
</nav>

<div class="error-container">
    <div class="error-card">
        <div class="error-icon">⚠️</div>
        <div class="error-code" th:text="${errorCode != null ? errorCode : '500'}">500</div>
        <div class="error-title" th:text="${errorTitle != null ? errorTitle : 'Something went wrong'}">Error</div>
        <div class="error-msg"   th:text="${errorMessage != null ? errorMessage : 'An unexpected error occurred. Please try again.'}">Error details here.</div>

        <a th:href="${backLink != null ? backLink : '/web/providers'}" class="btn">← Go Back</a>
        <a href="/web/" class="btn btn-gray">Home</a>
    </div>
</div>

</body>
</html>
