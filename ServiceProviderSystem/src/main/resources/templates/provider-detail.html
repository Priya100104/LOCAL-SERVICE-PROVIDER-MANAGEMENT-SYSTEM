<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${provider.businessName} + ' - Details'">Provider Details</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #f5f7fa; color: #333; }
        .navbar { background: #1565c0; color: white; padding: 16px 32px; display: flex; align-items: center; gap: 24px; }
        .navbar a { color: white; text-decoration: none; font-size: 15px; padding: 6px 12px; border-radius: 4px; }
        .navbar a:hover { background: rgba(255,255,255,0.15); }
        .navbar h1 { font-size: 18px; font-weight: 600; flex: 1; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .back-link { color: #1565c0; text-decoration: none; font-size: 14px; display: inline-block; margin-bottom: 20px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #1565c0, #0d47a1); color: white; padding: 28px 32px; }
        .card-header h2 { font-size: 24px; margin-bottom: 6px; }
        .card-header p  { opacity: 0.85; font-size: 15px; }
        .card-body  { padding: 32px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .info-item label { font-size: 12px; color: #888; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .info-item span  { font-size: 16px; font-weight: 500; }
        .badge { padding: 4px 14px; border-radius: 12px; font-size: 13px; font-weight: 500; }
        .badge-verified { background: #e8f5e9; color: #2e7d32; }
        .badge-pending  { background: #fff8e1; color: #f57c00; }
        .rating-stars   { color: #f59e0b; font-size: 20px; }
        .action-bar { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn { padding: 10px 22px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 500; border: none; cursor: pointer; }
        .btn-primary { background: #1565c0; color: white; }
        .btn-green   { background: #2e7d32; color: white; }
        .btn-red     { background: #c62828; color: white; }
        .btn-gray    { background: #78909c; color: white; }
        .divider { border: none; border-top: 1px solid #eee; margin: 24px 0; }
    </style>
</head>
<body>

<nav class="navbar">
    <h1>🔧 Service Provider System</h1>
    <a href="/web/">Home</a>
    <a href="/web/providers">Providers</a>
    <a href="/web/providers/add">Login or register</a>
    <a href="/api/providers" target="_blank">REST API</a>
</nav>

<div class="container">
    <a href="/web/providers" class="back-link">← Back to Providers</a>

    <div class="card">
        <div class="card-header">
            <h2 th:text="${provider.businessName}">Business Name</h2>
            <p th:text="${provider.serviceType} + ' Services'">Service Type</p>
        </div>
        <div class="card-body">

            <div class="info-grid">
                <div class="info-item">
                    <label>Provider ID</label>
                    <span th:text="'#' + ${provider.id}"></span>
                </div>
                <div class="info-item">
                    <label>Status</label>
                    <span class="badge"
                          th:classappend="${provider.verified ? 'badge-verified' : 'badge-pending'}"
                          th:text="${provider.verified ? '✅ Verified' : '⏳ Pending Verification'}"></span>
                </div>
                <div class="info-item">
                    <label>Username</label>
                    <span th:text="${provider.username}"></span>
                </div>
                <div class="info-item">
                    <label>Email</label>
                    <span th:text="${provider.email}"></span>
                </div>
                <div class="info-item">
                    <label>Phone</label>
                    <span th:text="${provider.phone}"></span>
                </div>
                <div class="info-item">
                    <label>Hourly Rate</label>
                    <span th:text="'₹' + ${provider.hourlyRate} + ' / hour'"></span>
                </div>
                <div class="info-item">
                    <label>Experience</label>
                    <span th:text="${provider.yearsOfExperience} + ' years'"></span>
                </div>
                <div class="info-item">
                    <label>Average Rating</label>
                    <span class="rating-stars">★</span>
                    <span th:text="${#numbers.formatDecimal(provider.averageRating,1,1)} + ' / 5.0'"></span>
                </div>
                <div class="info-item">
                    <label>Service Type</label>
                    <span th:text="${provider.serviceType}"></span>
                </div>
                <div class="info-item">
                    <label>Member Since</label>
                    <span th:text="${provider.createdAt}"></span>
                </div>
            </div>

            <hr class="divider"/>

            <div class="action-bar">
                <a href="/web/providers" class="btn btn-gray">← Back</a>

                <!-- Verify button (only when not verified) -->
                <form th:if="${!provider.verified}"
                      th:action="@{/web/providers/{id}/verify(id=${provider.id})}"
                      method="post" style="display:inline">
                    <button type="submit" class="btn btn-green">✅ Verify Provider</button>
                </form>

                <!-- Delete button -->
                <form th:action="@{/web/providers/{id}/delete(id=${provider.id})}"
                      method="post" style="display:inline"
                      onsubmit="return confirm('Are you sure you want to delete this provider?')">
                    <button type="submit" class="btn btn-red">🗑 Delete</button>
                </form>

                <!-- View JSON via REST API -->
                <a th:href="@{/api/providers/{id}(id=${provider.id})}"
                   target="_blank" class="btn btn-primary">📡 View JSON</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
