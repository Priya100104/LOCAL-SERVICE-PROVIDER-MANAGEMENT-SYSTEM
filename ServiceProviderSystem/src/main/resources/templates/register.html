<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Service Provider System</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
        body{background:#f0f4f8;min-height:100vh;display:flex;flex-direction:column}
        .navbar{background:#1565c0;padding:14px 32px;display:flex;align-items:center;gap:20px}
        .navbar h1{color:white;font-size:18px;flex:1}
        .navbar a{color:rgba(255,255,255,0.85);text-decoration:none;font-size:14px}
        .page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
        .card{background:white;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.12);width:100%;max-width:520px;overflow:hidden}
        .card-top{background:linear-gradient(135deg,#1565c0,#0d47a1);padding:28px 32px;color:white}
        .card-top h2{font-size:22px;margin-bottom:4px}
        .card-top p{opacity:.85;font-size:14px}
        .card-body{padding:32px}
        .error-box{background:#ffebee;border:1px solid #ef9a9a;color:#c62828;padding:10px 14px;border-radius:8px;margin-bottom:18px;font-size:14px}
        .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .form-group{margin-bottom:16px}
        label{display:block;font-size:13px;font-weight:500;color:#444;margin-bottom:5px}
        input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
        input:focus{border-color:#1565c0;box-shadow:0 0 0 3px #e3f2fd}
        .btn{width:100%;padding:12px;background:#1565c0;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
        .btn:hover{background:#0d47a1}
        .footer-link{text-align:center;margin-top:16px;font-size:14px;color:#666}
        .footer-link a{color:#1565c0;text-decoration:none;font-weight:500}
    </style>
</head>
<body>
<nav class="navbar">
    <h1>🔧 Service Provider System</h1>
    <a href="/web/">Home</a>
    <a href="/web/login">Login</a>
    <a href="/web/providers">Browse Providers</a>
</nav>
<div class="page">
    <div class="card">
        <div class="card-top">
            <h2>Create Customer Account</h2>
            <p>Register to book services and track your appointments</p>
        </div>
        <div class="card-body">
            <div th:if="${errorMsg}" class="error-box" th:text="${errorMsg}"></div>
            <form action="/web/register" method="post">
                <div class="row">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" name="firstName" placeholder="John" required/>
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" name="lastName" placeholder="Doe" required/>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Username *</label>
                        <input type="text" name="username" placeholder="john_doe" required/>
                    </div>
                    <div class="form-group">
                        <label>Password *</label>
                        <input type="password" name="password" placeholder="Password" required/>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" name="email" placeholder="john@email.com" required/>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" name="phone" placeholder="9876543210"/>
                    </div>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" name="address" placeholder="123 Main Street, City"/>
                </div>
                <button type="submit" class="btn">✅ Create Account</button>
            </form>
            <div class="footer-link">
                Already have an account? <a href="/web/login">Login here</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
