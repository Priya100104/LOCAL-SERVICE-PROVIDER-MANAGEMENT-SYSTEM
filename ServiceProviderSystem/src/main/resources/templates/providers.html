<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Providers - Service Provider System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #f5f7fa; color: #333; }
        .navbar { background: #1565c0; color: white; padding: 16px 32px; display: flex; align-items: center; gap: 24px; }
        .navbar a { color: white; text-decoration: none; font-size: 15px; padding: 6px 12px; border-radius: 4px; }
        .navbar a:hover { background: rgba(255,255,255,0.15); }
        .navbar h1 { font-size: 18px; font-weight: 600; flex: 1; }
        .container { max-width: 1100px; margin: 32px auto; padding: 0 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .page-header h2 { font-size: 22px; color: #1565c0; }
        .btn { display: inline-block; padding: 9px 20px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 500; border: none; cursor: pointer; }
        .btn-primary { background: #1565c0; color: white; }
        .btn-primary:hover { background: #0d47a1; }
        .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 4px; }
        .btn-green  { background: #2e7d32; color: white; }
        .btn-red    { background: #c62828; color: white; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-bar input  { flex: 1; padding: 9px 14px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .search-bar select { padding: 9px 14px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .search-bar button { padding: 9px 20px; background: #1565c0; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .table-wrap { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #1565c0; color: white; padding: 12px 16px; text-align: left; }
        td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
        tr:hover td { background: #f5f7fa; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .badge-verified { background: #e8f5e9; color: #2e7d32; }
        .badge-pending  { background: #fff8e1; color: #f57c00; }
        .rating { color: #f59e0b; }
        .empty-msg { text-align: center; padding: 40px; color: #888; font-size: 15px; }
        .count-label { font-size: 14px; color: #555; margin-bottom: 10px; }
    </style>
</head>
<body>

<nav class="navbar">
    <h1>🔧 Service Provider System</h1>
    <a href="/web/">Home</a>
    <a href="/web/providers">Providers</a>
    <a href="/web/providers/add">Add Provider</a>
    <a href="/web/providers/top">Top Rated</a>
    <a href="/api/providers" target="_blank">REST API</a>
</nav>

<div class="container">
    <div class="page-header">
        <h2 th:text="${pageTitle != null ? pageTitle : 'All Service Providers'}">All Service Providers</h2>
        <a href="/web/providers/add" class="btn btn-primary">+ Add New Provider</a>
    </div>

    <!-- Search / Filter Bar -->
    <form class="search-bar" action="/web/providers" method="get">
        <input type="text" name="search" placeholder="Search by business name..."
               th:value="${searchKeyword}"/>
        <select name="type">
            <option value="">All Service Types</option>
            <option value="Plumbing"   th:selected="${filterType == 'Plumbing'}">Plumbing</option>
            <option value="Electrical" th:selected="${filterType == 'Electrical'}">Electrical</option>
            <option value="Cleaning"   th:selected="${filterType == 'Cleaning'}">Cleaning</option>
            <option value="Carpentry"  th:selected="${filterType == 'Carpentry'}">Carpentry</option>
            <option value="Painting"   th:selected="${filterType == 'Painting'}">Painting</option>
        </select>
        <button type="submit">Search</button>
        <a href="/web/providers" class="btn btn-primary">Clear</a>
    </form>

    <p class="count-label">Showing <strong th:text="${totalCount}">0</strong> provider(s)</p>

    <div class="table-wrap">
        <table th:if="${!#lists.isEmpty(providers)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Business Name</th>
                    <th>Service Type</th>
                    <th>Rating</th>
                    <th>Experience</th>
                    <th>Hourly Rate</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${providers}">
                    <td th:text="${p.id}"></td>
                    <td>
                        <a th:href="@{/web/providers/{id}(id=${p.id})}"
                           th:text="${p.businessName}"
                           style="color:#1565c0; text-decoration:none; font-weight:500;"></a>
                    </td>
                    <td th:text="${p.serviceType}"></td>
                    <td>
                        <span class="rating">★</span>
                        <span th:text="${#numbers.formatDecimal(p.averageRating,1,1)}"></span>
                    </td>
                    <td th:text="${p.yearsOfExperience} + ' yrs'"></td>
                    <td th:text="'₹' + ${p.hourlyRate} + '/hr'"></td>
                    <td>
                        <span class="badge" th:classappend="${p.verified ? 'badge-verified' : 'badge-pending'}"
                              th:text="${p.verified ? 'Verified' : 'Pending'}"></span>
                    </td>
                    <td>
                        <a th:href="@{/web/providers/{id}(id=${p.id})}" class="btn btn-sm btn-primary">View</a>
                        <!-- Verify Button (shown only if not verified) -->
                        <form th:if="${!p.verified}" th:action="@{/web/providers/{id}/verify(id=${p.id})}"
                              method="post" style="display:inline">
                            <button type="submit" class="btn btn-sm btn-green">Verify</button>
                        </form>
                        <!-- Delete -->
                        <form th:action="@{/web/providers/{id}/delete(id=${p.id})}"
                              method="post" style="display:inline"
                              onsubmit="return confirm('Delete this provider?')">
                            <button type="submit" class="btn btn-sm btn-red">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="empty-msg" th:if="${#lists.isEmpty(providers)}">
            No providers found. <a href="/web/providers/add">Add one now!</a>
        </div>
    </div>
</div>

</body>
</html>
