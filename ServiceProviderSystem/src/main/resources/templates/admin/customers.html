<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Admin - Customers</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
        body{background:#f0f4f8}
        .navbar{background:#263238;padding:14px 32px;display:flex;align-items:center;gap:20px}
        .navbar h1{color:white;font-size:18px;flex:1}
        .navbar a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;padding:6px 12px;border-radius:4px}
        .navbar a:hover{background:rgba(255,255,255,0.12)}
        .container{max-width:1000px;margin:32px auto;padding:0 20px}
        h2{font-size:22px;color:#263238;margin-bottom:20px}
        table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.07)}
        th{background:#263238;color:white;padding:12px 16px;text-align:left;font-size:13px}
        td{padding:11px 16px;border-bottom:1px solid #f0f0f0;font-size:14px}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:#fafafa}
        .avatar{width:34px;height:34px;border-radius:50%;background:#e3f2fd;color:#1565c0;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;margin-right:8px;vertical-align:middle}
    </style>
</head>
<body>
<nav class="navbar">
    <h1>🛡 Admin Panel</h1>
    <a href="/web/admin/dashboard">Dashboard</a>
    <a href="/web/admin/providers">Providers</a>
    <a href="/web/admin/customers">Customers</a>
    <a href="/web/admin/bookings">Bookings</a>
    <a href="/web/logout">Logout</a>
</nav>
<div class="container">
    <h2>👥 All Customers (<span th:text="${#lists.size(customers)}">0</span>)</h2>
    <table>
        <thead>
            <tr><th>ID</th><th>Name</th><th>Username</th><th>Email</th><th>Phone</th><th>Address</th><th>Joined</th></tr>
        </thead>
        <tbody>
            <tr th:each="c : ${customers}">
                <td th:text="${c.id}"></td>
                <td>
                    <span class="avatar" th:text="${#strings.substring(c.firstName,0,1) + #strings.substring(c.lastName,0,1)}"></span>
                    <span th:text="${c.firstName + ' ' + c.lastName}"></span>
                </td>
                <td th:text="${c.username}"></td>
                <td th:text="${c.email}"></td>
                <td th:text="${c.phone}"></td>
                <td th:text="${c.address}"></td>
                <td th:text="${c.joinDate}"></td>
            </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(customers)}" style="color:#888;padding:20px 0">No customers registered yet.</p>
</div>
</body>
</html>
