<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Admin - Bookings</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
        body{background:#f0f4f8}
        .navbar{background:#263238;padding:14px 32px;display:flex;align-items:center;gap:20px}
        .navbar h1{color:white;font-size:18px;flex:1}
        .navbar a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;padding:6px 12px;border-radius:4px}
        .navbar a:hover{background:rgba(255,255,255,0.12)}
        .container{max-width:1200px;margin:32px auto;padding:0 20px}
        h2{font-size:22px;color:#263238;margin-bottom:20px}
        table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.07)}
        th{background:#263238;color:white;padding:11px 14px;text-align:left;font-size:13px}
        td{padding:10px 14px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:#fafafa}
        .badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;display:inline-block}
        .PENDING{background:#fff8e1;color:#f57c00}
        .ACCEPTED{background:#e3f2fd;color:#1565c0}
        .IN_PROGRESS{background:#e8eaf6;color:#3949ab}
        .COMPLETED{background:#e8f5e9;color:#2e7d32}
        .CANCELLED{background:#ffebee;color:#c62828}
        .update-form{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
        select{padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px}
        input[type=number]{padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;width:80px}
        .btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;border:none;cursor:pointer;background:#263238;color:white}
        .btn:hover{background:#37474f}
        .rating-stars{color:#f59e0b}
    </style>
</head>
<body>
<nav class="navbar">
    <h1>🛡 Admin Panel</h1>
    <a href="/web/admin/dashboard">Dashboard</a>
    <a href="/web/admin/providers">Providers</a>
    <a href="/web/admin/customers">Customers</a>
    <a href="/web/admin/bookings">Bookings</a>
    <a href="/web/logout">Logout</a>
</nav>
<div class="container">
    <h2>📋 All Bookings (<span th:text="${#lists.size(bookings)}">0</span>)</h2>
    <table>
        <thead>
            <tr><th>ID</th><th>Customer</th><th>Provider</th><th>Service</th><th>Date</th><th>Status</th><th>Price</th><th>Review</th><th>Update Status</th></tr>
        </thead>
        <tbody>
            <tr th:each="b : ${bookings}">
                <td th:text="${b.id}"></td>
                <td th:text="${b.customer.firstName + ' ' + b.customer.lastName}"></td>
                <td th:text="${b.provider.businessName}"></td>
                <td th:text="${b.serviceType}"></td>
                <td th:text="${b.scheduledDate.toLocalDate()}"></td>
                <td><span class="badge" th:classappend="${b.status}" th:text="${b.status}"></span></td>
                <td th:text="${b.finalPrice > 0 ? '₹' + b.finalPrice : '-'}"></td>
                <td>
                    <span th:if="${b.rating > 0}">
                        <span class="rating-stars" th:text="${'★'.repeat(b.rating)}"></span>
                        (<span th:text="${b.rating}"></span>/5)
                    </span>
                    <span th:if="${b.rating == 0}" style="color:#bbb">No review</span>
                </td>
                <td>
                    <form th:action="@{/web/admin/bookings/{id}/status(id=${b.id})}" method="post">
                        <div class="update-form">
                            <select name="status">
                                <option th:selected="${b.status == 'PENDING'}"      value="PENDING">PENDING</option>
                                <option th:selected="${b.status == 'ACCEPTED'}"     value="ACCEPTED">ACCEPTED</option>
                                <option th:selected="${b.status == 'IN_PROGRESS'}"  value="IN_PROGRESS">IN_PROGRESS</option>
                                <option th:selected="${b.status == 'COMPLETED'}"    value="COMPLETED">COMPLETED</option>
                                <option th:selected="${b.status == 'CANCELLED'}"    value="CANCELLED">CANCELLED</option>
                            </select>
                            <input type="number" name="finalPrice" placeholder="₹ Price" min="0" th:value="${b.finalPrice > 0 ? b.finalPrice : ''}"/>
                            <button type="submit" class="btn">Update</button>
                        </div>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(bookings)}" style="color:#888;padding:20px 0">No bookings yet.</p>
</div>
</body>
</html>
