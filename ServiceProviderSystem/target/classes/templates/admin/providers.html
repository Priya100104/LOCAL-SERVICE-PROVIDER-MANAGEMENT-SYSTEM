<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Admin - Providers</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
        body{background:#f0f4f8}
        .navbar{background:#263238;padding:14px 32px;display:flex;align-items:center;gap:20px}
        .navbar h1{color:white;font-size:18px;flex:1}
        .navbar a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;padding:6px 12px;border-radius:4px}
        .navbar a:hover{background:rgba(255,255,255,0.12)}
        .container{max-width:1100px;margin:32px auto;padding:0 20px}
        .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        h2{font-size:22px;color:#263238}
        .btn{display:inline-block;padding:7px 18px;border-radius:6px;font-size:13px;font-weight:500;text-decoration:none;border:none;cursor:pointer}
        .btn-blue{background:#1565c0;color:white}
        .btn-green{background:#2e7d32;color:white}
        .btn-red{background:#c62828;color:white}
        table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.07)}
        th{background:#263238;color:white;padding:12px 16px;text-align:left;font-size:13px}
        td{padding:11px 16px;border-bottom:1px solid #f0f0f0;font-size:14px}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:#fafafa}
        .badge{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500}
        .badge-verified{background:#e8f5e9;color:#2e7d32}
        .badge-pending{background:#fff8e1;color:#f57c00}
        .rating{color:#f59e0b}
    </style>
</head>
<body>
<nav class="navbar">
    <h1>🛡 Admin Panel</h1>
    <a href="/web/admin/dashboard">Dashboard</a>
    <a href="/web/admin/providers">Providers</a>
    <a href="/web/admin/customers">Customers</a>
    <a href="/web/admin/bookings">Bookings</a>
    <a href="/web/providers/add">Add Provider</a>
    <a href="/web/logout">Logout</a>
</nav>
<div class="container">
    <div class="page-header">
        <h2>👷 All Service Providers</h2>
        <a href="/web/providers/add" class="btn btn-blue">+ Add New Provider</a>
    </div>
    <table>
        <thead>
            <tr><th>ID</th><th>Business Name</th><th>Service</th><th>Rating</th><th>Exp</th><th>Rate/hr</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody>
            <tr th:each="p : ${providers}">
                <td th:text="${p.id}"></td>
                <td><strong th:text="${p.businessName}"></strong><br/><small style="color:#888" th:text="${p.email}"></small></td>
                <td th:text="${p.serviceType}"></td>
                <td><span class="rating">★</span> <span th:text="${#numbers.formatDecimal(p.averageRating,1,1)}"></span></td>
                <td th:text="${p.yearsOfExperience} + ' yrs'"></td>
                <td th:text="'₹' + ${p.hourlyRate}"></td>
                <td>
                    <span class="badge" th:classappend="${p.verified ? 'badge-verified' : 'badge-pending'}"
                          th:text="${p.verified ? '✅ Verified' : '⏳ Pending'}"></span>
                </td>
                <td style="display:flex;gap:6px;flex-wrap:wrap">
                    <form th:if="${!p.verified}" th:action="@{/web/providers/{id}/verify(id=${p.id})}" method="post" style="display:inline">
                        <button type="submit" class="btn btn-green">Verify</button>
                    </form>
                    <form th:action="@{/web/providers/{id}/delete(id=${p.id})}" method="post" style="display:inline"
                          onsubmit="return confirm('Delete this provider?')">
                        <button type="submit" class="btn btn-red">Delete</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
