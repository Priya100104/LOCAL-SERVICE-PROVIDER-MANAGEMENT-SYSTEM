<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>My Bookings</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
        body{background:#f0f4f8}
        .navbar{background:#1565c0;padding:14px 32px;display:flex;align-items:center;gap:20px}
        .navbar h1{color:white;font-size:18px;flex:1}
        .navbar a{color:rgba(255,255,255,0.85);text-decoration:none;font-size:14px;padding:6px 12px;border-radius:4px}
        .navbar a:hover{background:rgba(255,255,255,0.15)}
        .container{max-width:1100px;margin:32px auto;padding:0 20px}
        .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        h2{font-size:22px;color:#1565c0}
        .success-box{background:#e8f5e9;border:1px solid #a5d6a7;color:#2e7d32;padding:12px 16px;border-radius:8px;margin-bottom:18px;font-size:14px}
        table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.07)}
        th{background:#1565c0;color:white;padding:12px 16px;text-align:left;font-size:13px}
        td{padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:14px}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:#fafafa}
        .badge{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:500;display:inline-block}
        .PENDING{background:#fff8e1;color:#f57c00}
        .ACCEPTED{background:#e3f2fd;color:#1565c0}
        .IN_PROGRESS{background:#e8eaf6;color:#3949ab}
        .COMPLETED{background:#e8f5e9;color:#2e7d32}
        .CANCELLED{background:#ffebee;color:#c62828}
        .btn{display:inline-block;padding:6px 16px;border-radius:6px;font-size:13px;font-weight:500;text-decoration:none;background:#1565c0;color:white;border:none;cursor:pointer}
        .btn-star{background:#f59e0b;color:white}
        .btn-a{background:#1565c0}
        .empty{text-align:center;padding:48px;color:#888;font-size:15px}
        .rating-stars{color:#f59e0b}
        .reviewed-tag{font-size:12px;color:#2e7d32;font-weight:500}
    </style>
</head>
<body>
<nav class="navbar">
    <h1>🔧 Service Provider System</h1>
    <a href="/web/customer/dashboard">Dashboard</a>
    <a href="/web/customer/book">Book Service</a>
    <a href="/web/customer/mybookings">My Bookings</a>
    <a href="/web/providers">Browse Providers</a>
    <a href="/web/logout">Logout</a>
</nav>
<div class="container">
    <div class="page-header">
        <h2>📋 My Bookings</h2>
        <a href="/web/customer/book" class="btn btn-a">+ Book New Service</a>
    </div>

    <div th:if="${successMsg}" class="success-box" th:text="${successMsg}"></div>

    <table th:if="${!#lists.isEmpty(bookings)}">
        <thead>
            <tr><th>#</th><th>Service</th><th>Provider</th><th>Date</th><th>Address</th><th>Status</th><th>Price</th><th>Action</th></tr>
        </thead>
        <tbody>
            <tr th:each="b : ${bookings}">
                <td th:text="${b.id}"></td>
                <td th:text="${b.serviceType}"></td>
                <td>
                    <a th:href="@{/web/providers/{id}(id=${b.provider.id})}"
                       th:text="${b.provider.businessName}"
                       style="color:#1565c0;text-decoration:none"></a>
                </td>
                <td th:text="${b.scheduledDate.toLocalDate()}"></td>
                <td th:text="${b.address}"></td>
                <td><span class="badge" th:classappend="${b.status}" th:text="${b.status}"></span></td>
                <td th:text="${b.finalPrice > 0 ? '₹' + b.finalPrice : '-'}"></td>
                <td>
                    <!-- Show Review button only if COMPLETED and not reviewed -->
                    <a th:if="${b.status == 'COMPLETED' and !b.reviewed}"
                       th:href="@{/web/customer/review/{id}(id=${b.id})}"
                       class="btn btn-star">⭐ Rate & Review</a>
                    <!-- Show reviewed status -->
                    <span th:if="${b.status == 'COMPLETED' and b.reviewed}" class="reviewed-tag">
                        ✅ Reviewed (<span class="rating-stars">★</span><span th:text="${b.rating}"></span>/5)
                    </span>
                    <span th:if="${b.status != 'COMPLETED'}" style="color:#aaa;font-size:12px" th:text="${b.status}"></span>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="empty" th:if="${#lists.isEmpty(bookings)}">
        <p>No bookings yet.</p>
        <a href="/web/customer/book" class="btn" style="margin-top:16px;display:inline-block">Book Your First Service</a>
    </div>
</div>
</body>
</html>
